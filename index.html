<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area 11 | Catálogo Exclusivo</title>
    <style>
        /* Estilos Generales */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #ffffff; 
            color: #111111; 
        }
        
        /* Encabezado */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            border-bottom: 1px solid #eaeaea; 
        }
        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }
        .secret-admin input { 
            padding: 10px; 
            border: 1px solid #e5e5e5; 
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        /* Sección Principal */
        .hero { 
            text-align: center; 
            padding: 80px 20px; 
            background-color: #fcfcfc; 
        }
        .hero h1 { 
            font-size: 42px; 
            margin-bottom: 10px; 
            font-weight: 400;
        }
        .hero p {
            color: #666;
            font-size: 18px;
        }

        /* Cuadrícula de Catálogo */
        .catalog { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
            padding: 60px 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .product-card { 
            cursor: pointer; 
            transition: transform 0.3s ease; 
        }
        .product-card:hover { 
            transform: translateY(-5px); 
        }
        .product-image { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            background-color: #f0f0f0; 
            border-radius: 4px;
        }
        .product-info { 
            padding: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
        }
        .product-name { 
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 5px;
        }
        .product-price { 
            color: #666; 
            font-size: 15px;
        }

        .edit-btn { 
            display: none; 
            background: #111; 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            cursor: pointer; 
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
        }
        .admin-mode .edit-btn { 
            display: inline-block; 
        }

        /* Modales */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        .modal-content { 
            background: white; 
            padding: 40px; 
            max-width: 700px; 
            width: 90%; 
            max-height: 90vh; 
            overflow-y: auto; 
            position: relative; 
            border-radius: 8px;
        }
        .close { 
            position: absolute; 
            top: 20px; 
            right: 25px; 
            font-size: 28px; 
            cursor: pointer; 
            color: #999;
        }
        
        .main-modal-img { 
            width: 100%; 
            height: 400px; 
            object-fit: cover; 
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .modal-images { 
            display: flex; 
            gap: 15px; 
            overflow-x: auto; 
            margin-bottom: 25px; 
        }
        .modal-images img { 
            height: 80px; 
            width: 80px;
            object-fit: cover; 
            cursor: pointer; 
            border: 2px solid transparent; 
            border-radius: 4px;
        }
        .modal-images img:hover { border-color: #111; }

        .contact-btns { 
            margin-top: 30px; 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap;
        }
        .btn { 
            padding: 15px 24px; 
            text-decoration: none; 
            color: white; 
            text-align: center; 
            flex: 1; 
            text-transform: uppercase; 
            font-size: 14px; 
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-wa { background: #25D366; }
        .btn-ig { background: #E1306C; }
        .btn-save { background: #111; margin-top: 10px; width: 100%; }

        .admin-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px;}
        .admin-form input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;}
    </style>
</head>
<body>

    <header>
        <div class="logo">Area 11</div>
        <div class="secret-admin">
            <input type="password" id="discount-code" placeholder="Código de acceso" onkeyup="verificarAdmin()">
        </div>
    </header>

    <section class="hero">
        <h1>Jerseys de Élite</h1>
        <p>Explora nuestro catálogo completo.</p>
    </section>

    <div class="catalog" id="catalog"></div>

    <div class="modal" id="view-modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal('view-modal')">&times;</span>
            <img id="main-view-img" class="main-modal-img" src="" alt="Producto">
            <div class="modal-images" id="gallery-container"></div>
            <h2 id="view-name"></h2>
            <p id="view-price"></p>
            <div class="contact-btns">
                <a href="https://wa.me/526121174569" target="_blank" class="btn btn-wa">WhatsApp</a>
                <a href="https://www.instagram.com/4rea.11/" target="_blank" class="btn btn-ig">Instagram</a>
            </div>
        </div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal('edit-modal')">&times;</span>
            <h2>Editar Producto</h2>
            <div class="admin-form">
                <input type="text" id="edit-name" placeholder="Nombre">
                <input type="text" id="edit-price" placeholder="Precio">
                <input type="text" id="edit-main-img" placeholder="URL Imagen Principal">
                <input type="text" id="edit-gallery-1" placeholder="URL Galería 1">
                <input type="text" id="edit-gallery-2" placeholder="URL Galería 2">
                <button class="btn btn-save" onclick="guardarCambios()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // Función para generar 67 productos de forma limpia
        function cargarBaseDeDatos() {
            let base = [];
            const imgPlaceholder = "https://images.unsplash.com/photo-1614631446501-abcf76949eca?w=600";
            
            for(let i=1; i<=67; i++) {
                base.push({
                    id: i,
                    name: "Jersey Area 11 - Modelo " + i,
                    price: "$600 MXN",
                    mainImg: imgPlaceholder,
                    gallery: [imgPlaceholder]
                });
            }
            return base;
        }

        // Cargamos datos: Si no hay en localStorage, generamos los 67 por defecto
        let productos = JSON.parse(localStorage.getItem('area11_v3')) || cargarBaseDeDatos();
        let idEdicionActual = null;

        function renderizarProductos() {
            const catalogo = document.getElementById('catalog');
            catalogo.innerHTML = '';
            productos.forEach(p => {
                catalogo.innerHTML += `
                    <div class="product-card">
                        <img src="${p.mainImg}" class="product-image" onclick="abrirVistaProducto(${p.id})">
                        <div class="product-info">
                            <div>
                                <div class="product-name">${p.name}</div>
                                <div class="product-price">${p.price}</div>
                            </div>
                            <button class="edit-btn" onclick="abrirModalEdicion(${p.id})">Editar</button>
                        </div>
                    </div>
                `;
            });
        }

        function verificarAdmin() {
            const codigo = document.getElementById('discount-code').value;
            if (codigo === '04050607') document.body.classList.add('admin-mode');
            else document.body.classList.remove('admin-mode');
        }

        function abrirVistaProducto(id) {
            const p = productos.find(x => x.id === id);
            document.getElementById('main-view-img').src = p.mainImg;
            document.getElementById('view-name').innerText = p.name;
            document.getElementById('view-price').innerText = p.price;
            document.getElementById('view-modal').style.display = 'flex';
        }

        function abrirModalEdicion(id) {
            idEdicionActual = id;
            const p = productos.find(x => x.id === id);
            document.getElementById('edit-name').value = p.name;
            document.getElementById('edit-price').value = p.price;
            document.getElementById('edit-main-img').value = p.mainImg;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function guardarCambios() {
            const p = productos.find(x => x.id === idEdicionActual);
            p.name = document.getElementById('edit-name').value;
            p.price = document.getElementById('edit-price').value;
            p.mainImg = document.getElementById('edit-main-img').value;
            localStorage.setItem('area11_v3', JSON.stringify(productos));
            renderizarProductos();
            cerrarModal('edit-modal');
        }

        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        renderizarProductos();
    </script>
</body>
</html>
